    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <img src="/assets/logo site ongs.png" alt="Logo ONG Connect">
        </div>

        <nav class="menu">
            <a href="/html/index.html">Home</a>
            <a href="/html/ongs.html">ONGs</a>
            <a href="/html/ajude.html">Ajude</a>
            <a href="/html/admin.html">Admin</a>
        </nav>

          <nav class="navh">
            <button class="menuh">
                <i class="bi bi-list"></i>
            </button>
        </nav>

        <section class="menu-mobile-container">
            <nav class="menu-mobile" id="menuMobile">
                <a href="index.html">Home</a>
                <a href="ongs.html">ONGs</a>
                <a href="ajude.html">Ajude</a>
                <a href="admin.html">Admin</a>
            </nav>
        </section>

    </header>
    <main>
        <h1>Faça parte de alguma ONG</h1>
        <h3>Preencha o formulário abaixo para se cadastrar como voluntário.</h3>
        <form id="volunteerForm" method="post" class="formulario">
        <section>
            <nav>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" value="" placeholder="Digite seu nome" maxlength="100" required>
            </nav>

            <nav>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" value="" placeholder="(XX) XXXXX-XXXX" maxlength="15" required>
            </nav>

            <nav>
                <label for="email">Email:</label>
                <input type="email" id="email" value="" placeholder="Digite seu email" maxlength="100" required>
            </nav>

            <nav>
                <label for="ongs">ONGs:</label>
                <select id="ongs" class="ONGs" required>
                    <option value="">Selecione uma ONG</option>
                    <option value="Casa Santa Gemma">Casa Santa Gemma</option>
                    <option value="APA">Associação Protetora de Animais (APA)</option>
                    <option value="GLPV">Grupo Luta Pela Vida (GLPV)</option>
                    <option value="Missão Sal da Terra">Missão Sal da Terra</option>
                    <option value="Pontes de Amor">Pontes de Amor</option>
                </select>
            </nav>

            <nav>
                <label for="mensagem">Por que você quer ser voluntário?</label>
                <textarea id="mensagem" rows="4" placeholder="Digite sua mensagem" required></textarea>
            </nav>
        </section>

            <nav class="botao-enviar">
            <button type="submit" value="Enviar formulario" class="env">Enviar formulario</button>
        </nav>

        </form>
    </main>

    <script src="ongs.js"></script>
    <script src="volun.js"></script>
</body>
</html>
